<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>boaterface</title>
  <script src="/htmx.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .instrument {
      text-align: center;
      padding: 2rem;
    }
    .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #666;
      margin-bottom: 0.5rem;
    }
    .value {
      font-size: 4rem;
      font-weight: bold;
      color: #44aaff;
    }
    #staleness {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #444;
      transition: color 0.3s;
    }
    #staleness.stale { color: #ff4444; }
  </style>
</head>
<body>
  <div class="instrument">
    <div class="label">UTC</div>
    <div class="value" id="time" hx-get="/time" hx-trigger="every 1s" hx-swap="innerHTML">
      --:--:--
    </div>
    <div id="staleness"></div>
  </div>
  <script>
    let lastUpdate = null;

    document.getElementById('time').addEventListener('htmx:afterSwap', () => {
      lastUpdate = Date.now();
    });

    setInterval(() => {
      const el = document.getElementById('staleness');
      if (lastUpdate === null) return;
      const seconds = Math.floor((Date.now() - lastUpdate) / 1000);
      el.textContent = `last update ${seconds}s ago`;
      el.classList.toggle('stale', seconds >= 3);
    }, 500);
  </script>
</body>
</html>
